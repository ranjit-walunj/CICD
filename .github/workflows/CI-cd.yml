name: CI/CD Pipeline

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint with flake8
        run: flake8 .

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Test with pytest
        run: pytest

  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit
      - name: Run security checks with Bandit
        run: bandit -r . -c "bandit.yaml" || bandit -r .

  # New job: Build Docker image for the application
  build_docker_image:
    runs-on: ubuntu-latest
    needs: security # Ensure security checks pass before building the image
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: |
          # Replace 'your-username/your-flask-app' with your Docker Hub username and desired image name
          # This builds the image and tags it with 'latest'
          docker build -t ranjitwalunj/your-flask-app:latest .
          # Tag with the commit SHA for unique versioning
          docker tag ranjitwalunj/your-flask-app:latest ranjitwalunj/your-flask-app:${{ github.sha }}

  # New job: Push Docker image to a container registry (e.g., Docker Hub)
  push_docker_image:
    runs-on: ubuntu-latest
    needs: build_docker_image # Ensure the image is built first
    # Only run this job when pushing to the main/master branch, not on pull requests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }} # GitHub Secret for Docker Hub username
          password: ${{ secrets.DOCKER_PASSWORD }} # GitHub Secret for Docker Hub password
      - name: Push Docker images
        run: |
          # Ensure the image name matches what was built in the previous job
          docker push ranjitwalunj/your-flask-app:latest